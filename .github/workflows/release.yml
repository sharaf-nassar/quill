name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ''
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting version to ${VERSION}"
          sed -i.bak -E 's/^version = ".*"/version = "'"${VERSION}"'"/' src-tauri/Cargo.toml
          rm -f src-tauri/Cargo.toml.bak
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json'));
            p.version = '${VERSION}';
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "

      - name: Import Apple Developer Certificate
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          trap 'rm -f certificate.p12' EXIT
          echo $APPLE_CERTIFICATE | base64 -d > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain
          CERT_ID=$(security find-identity -v -p codesigning build.keychain | head -1 | awk -F'"' '{print $2}')
          if [ -z "$CERT_ID" ]; then
            echo "::error::No codesigning identity found in build.keychain"
            exit 1
          fi
          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> $GITHUB_ENV

      - name: Install frontend dependencies
        run: npm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          # Notarization handled separately below — Tauri's built-in apple-codesign
          # polls indefinitely and loses network on GH Actions after ~2h
        with:
          tagName: v__VERSION__
          releaseName: 'Quill v__VERSION__'
          releaseBody: 'Download the installer for your platform from the assets below.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Notarize macOS DMG
        if: matrix.platform == 'macos-latest'
        timeout-minutes: 35
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TARGET=$(echo "${{ matrix.args }}" | sed 's/--target //')
          DMG=$(find "src-tauri/target/${TARGET}/release/bundle/dmg" -name "*.dmg" 2>/dev/null | head -1)
          if [ -z "$DMG" ]; then
            echo "::error::No DMG found for target ${TARGET}"
            exit 1
          fi

          echo "Notarizing $(basename "$DMG")..."
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 30m

          echo "Stapling notarization ticket..."
          xcrun stapler staple "$DMG"

          echo "Re-uploading notarized DMG to release..."
          gh release upload "${{ github.ref_name }}" "$DMG" --clobber

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract release notes from annotated tag
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          NOTES=$(git tag -l --format='%(body)' "$TAG_NAME")
          if [ -n "$NOTES" ]; then
            echo "$NOTES" > release_notes.md
            echo "Extracted release notes from tag annotation"
          else
            echo "No tag annotation found, using default"
          fi

      - name: Rename release assets with platform labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          # Find the draft release with retry (API may lag after build)
          RELEASE_ID=""
          for attempt in 1 2 3 4 5; do
            RELEASE_ID=$(gh api "repos/${GH_REPO}/releases" --paginate -q ".[] | select(.tag_name == \"${TAG_NAME}\") | .id" | head -n1)
            if [[ -n "$RELEASE_ID" ]]; then
              break
            fi
            echo "Attempt ${attempt}: release not found yet, waiting 15s..."
            sleep 15
          done
          if [[ -z "$RELEASE_ID" ]]; then
            echo "::error::Could not find release for tag ${TAG_NAME} after 5 attempts"
            exit 1
          fi
          echo "Found release ID: ${RELEASE_ID}"

          # Rename assets: insert platform between version and arch (skip already-renamed)
          gh api "repos/${GH_REPO}/releases/${RELEASE_ID}/assets" --jq '.[] | "\(.id)\t\(.name)"' | while IFS=$'\t' read -r id name; do
            # Skip files that already have a platform label
            if [[ "$name" =~ _(linux|macOS|windows)_ ]]; then
              continue
            fi

            new_name="$name"

            if [[ "$name" == *".AppImage"* ]] || [[ "$name" == *".deb"* ]]; then
              new_name=$(echo "$name" | sed -E 's/(_[0-9]+\.[0-9]+\.[0-9]+)_/\1_linux_/')
            elif [[ "$name" == *".app.tar.gz"* ]] || [[ "$name" == *".dmg"* ]]; then
              new_name=$(echo "$name" | sed -E 's/(_[0-9]+\.[0-9]+\.[0-9]+)_/\1_macOS_/')
            elif [[ "$name" == *".exe"* ]] || [[ "$name" == *".nsis"* ]] || [[ "$name" == *".msi"* ]]; then
              new_name=$(echo "$name" | sed -E 's/(_[0-9]+\.[0-9]+\.[0-9]+)_/\1_windows_/')
            fi

            if [[ "$new_name" != "$name" ]]; then
              echo "Renaming: $name -> $new_name"
              gh api --method PATCH "repos/${GH_REPO}/releases/assets/${id}" -f name="$new_name"
            fi
          done

          # Update latest.json URLs to match renamed filenames
          LATEST_ID=$(gh api "repos/${GH_REPO}/releases/${RELEASE_ID}/assets" --jq '.[] | select(.name == "latest.json") | .id')
          if [[ -n "$LATEST_ID" ]]; then
            gh api "repos/${GH_REPO}/releases/assets/${LATEST_ID}" \
              -H "Accept: application/octet-stream" > latest.json

            sed -i -E 's/(_[0-9]+\.[0-9]+\.[0-9]+)_(.*\.AppImage)/\1_linux_\2/g' latest.json
            sed -i -E 's/(_[0-9]+\.[0-9]+\.[0-9]+)_(.*\.deb)/\1_linux_\2/g' latest.json
            sed -i -E 's/(_[0-9]+\.[0-9]+\.[0-9]+)_(.*\.app\.tar\.gz)/\1_macOS_\2/g' latest.json
            sed -i -E 's/(_[0-9]+\.[0-9]+\.[0-9]+)_(.*\.dmg)/\1_macOS_\2/g' latest.json
            sed -i -E 's/(_[0-9]+\.[0-9]+\.[0-9]+)_(.*\.exe)/\1_windows_\2/g' latest.json
            sed -i -E 's/(_[0-9]+\.[0-9]+\.[0-9]+)_(.*\.nsis)/\1_windows_\2/g' latest.json
            sed -i -E 's/(_[0-9]+\.[0-9]+\.[0-9]+)_(.*\.msi)/\1_windows_\2/g' latest.json

            gh api --method DELETE "repos/${GH_REPO}/releases/assets/${LATEST_ID}"
            gh release upload "${TAG_NAME}" latest.json --clobber
          fi

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if [ -f release_notes.md ]; then
            gh release edit "$TAG_NAME" --draft=false --notes-file release_notes.md
          else
            gh release edit "$TAG_NAME" --draft=false
          fi
